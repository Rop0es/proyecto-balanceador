<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería Docker Balanceada</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

    <h1>Panel de Control Apache - Balanceado</h1>

    <div class="grid-container">
        <div class="card">
            <img src="si1.webp" alt="Imagen 1">
            <p>Elemento: si1.webp</p>
        </div>

        <div class="card">
            <img src="si2.webp" alt="Imagen 2">
            <p>Elemento: si2.webp</p>
        </div>

        <div class="card">
            <img src="si3.webp" alt="Imagen 3">
            <p>Elemento: si3.webp</p>
        </div>

        <div class="card">
            <video width="100%" controls autoplay muted loop>
                <source src="videoplayback.mp4" type="video/mp4">
                Tu navegador no soporta el formato de video.
            </video>
            <p>Video: videoplayback.mp4</p>
        </div>
    </div>

</body>
</html>
